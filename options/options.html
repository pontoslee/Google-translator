<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Trade Translator 高级设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Trade Translator 高级设置</h1>
    <section id="settings-section" class="section">
      <h2>翻译设置</h2>
      <div class="form-group">
        <label for="provider">翻译提供者</label>
        <select id="provider">
          <option value="google_free">免费谷歌翻译</option>
          <option value="openai_compatible">OpenAI 兼容</option>
          <option value="custom_rest">自定义 REST</option>
        </select>
      </div>
      <div id="openai-fields" class="provider-fields">
        <div class="form-group">
          <label for="baseUrl">Base URL</label>
          <input type="text" id="baseUrl" />
        </div>
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <input type="text" id="apiKey" />
        </div>
        <div class="form-group">
          <label for="model">模型</label>
          <input type="text" id="model" />
        </div>
        <div class="form-group">
          <label for="customPrompt">自定义提示词</label>
          <textarea id="customPrompt" rows="3"></textarea>
        </div>
      </div>
      <div id="custom-rest-fields" class="provider-fields">
        <div class="form-group">
          <label for="restEndpoint">接口 Endpoint</label>
          <input type="text" id="restEndpoint" />
        </div>
        <div class="form-group">
          <label for="restApiKey">API Key</label>
          <input type="text" id="restApiKey" />
        </div>
      </div>
      <div class="form-group">
        <label for="inboundLang">来信目标语言</label>
        <input type="text" id="inboundLang" />
      </div>
      <div class="form-group">
        <label for="replyLang">回复目标语言</label>
        <input type="text" id="replyLang" />
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="enableToolbar" /> 启用悬浮工具栏</label>
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="enableAutoDecorate" /> 自动记录与翻译来信</label>
      </div>
      <button id="saveSettings" class="primary-btn">保存设置</button>
    </section>
    <section id="tags-section" class="section">
      <h2>客户标签管理</h2>
      <table id="tags-table">
        <thead>
          <tr>
            <th>会话ID</th>
            <th>意向</th>
            <th>地区</th>
            <th>进度</th>
            <th>语言</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>
    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
