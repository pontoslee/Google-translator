<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Trade Translator 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="title">Trade Translator</h1>
    <div class="form-group">
      <label for="provider">翻译提供者</label>
      <select id="provider">
        <option value="google_free">免费谷歌翻译</option>
        <option value="openai_compatible">OpenAI 兼容</option>
        <option value="custom_rest">自定义 REST</option>
      </select>
    </div>
    <div id="openai-fields" class="provider-fields">
      <div class="form-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.example.com" />
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="text" id="apiKey" placeholder="sk-..." />
      </div>
      <div class="form-group">
        <label for="model">模型</label>
        <input type="text" id="model" placeholder="gpt-4.1-mini" />
      </div>
      <div class="form-group">
        <label for="customPrompt">自定义提示词</label>
        <textarea id="customPrompt" rows="3" placeholder="用于翻译的提示词"></textarea>
      </div>
    </div>
    <div id="custom-rest-fields" class="provider-fields">
      <div class="form-group">
        <label for="restEndpoint">接口 Endpoint</label>
        <input type="text" id="restEndpoint" placeholder="https://example.com/translate" />
      </div>
      <div class="form-group">
        <label for="restApiKey">API Key</label>
        <input type="text" id="restApiKey" placeholder="Key if required" />
      </div>
    </div>
    <div class="form-group">
      <label for="inboundLang">来信目标语言</label>
      <input type="text" id="inboundLang" placeholder="如 zh-CN" />
    </div>
    <div class="form-group">
      <label for="replyLang">回复目标语言</label>
      <input type="text" id="replyLang" placeholder="如 en" />
    </div>
    <div class="form-group checkbox-group">
      <label><input type="checkbox" id="enableToolbar" /> 启用悬浮工具栏</label>
    </div>
    <div class="form-group checkbox-group">
      <label><input type="checkbox" id="enableAutoDecorate" /> 自动记录与翻译来信</label>
    </div>
    <div class="buttons">
      <button id="saveBtn">保存</button>
      <button id="openOptions">管理标签/高级设置</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
